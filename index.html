<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E8943A">
<title>BenAI v3.16</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#080808;--s1:#101010;--s2:#161616;--s3:#1E1E1E;--b1:#242424;--b2:#2E2E2E;
  --t1:#F2EFE8;--t2:#A8A49C;--t3:#5A5650;
  --a:#E8943A;--a2:#C4711A;--a3:rgba(232,148,58,.12);
  --g:#22C55E;--g2:rgba(34,197,94,.12);
  --r:#F87171;--r2:rgba(248,113,113,.12);
  --bl:#60A5FA;--bl2:rgba(96,165,250,.12);
  --y:#FBBF24;--y2:rgba(251,191,36,.12);
}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);}
#login-screen, #tuto-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
#tuto-overlay{background:rgba(0,0,0,0.95); z-index:2000; display:none;}
.login-box{width:380px;padding:40px 36px;background:var(--s1);border:1px solid var(--b1);border-radius:20px;box-shadow:0 40px 80px rgba(0,0,0,.6);}
.login-input{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;color:var(--t1);margin-bottom:14px;outline:none;font-family:inherit;}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;}
.login-btn:hover{opacity:.9;}
#app{display:none;height:100%;flex-direction:column;}
#app.visible{display:flex;}
.topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow-y:auto;padding-top:10px;}
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;}
.sb-item{padding:10px 16px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;border-radius:8px;margin:2px 8px;}
.sb-item.active{background:var(--a3);color:var(--a);}
.lead-card{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:15px;margin-bottom:10px;cursor:pointer;transition:0.2s;}
.lead-card:hover{border-color:var(--a);}
.statut-btn{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;border:2px solid transparent;font-family:inherit;}
.selected{border-color:white;}
.stat-box{background:var(--s3);border-radius:10px;padding:15px;text-align:center;flex:1;}
.stat-box-val{font-size:24px;font-weight:800;color:var(--a);}
.stat-box-lbl{font-size:10px;text-transform:uppercase;color:var(--t3);margin-top:5px;}
.btn-call{color:var(--bl);text-decoration:none;font-weight:700;font-size:12px;background:var(--bl2);padding:4px 8px;border-radius:6px;display:inline-block;}
/* Forms */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-label{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}
.timeline-item{padding:8px;border-bottom:1px solid var(--b1);font-size:12px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:50px;height:50px;background:var(--a);border-radius:12px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#fff;">B</div>
      <h1>BenAI v3.16</h1>
    </div>
    <input type="text" id="login-user" class="login-input" placeholder="Identifiant (ex: benjamin)">
    <input type="password" id="login-pwd" class="login-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Se connecter</button>
    <div id="login-err" style="color:var(--r);font-size:12px;margin-top:10px;text-align:center"></div>
  </div>
</div>

<div id="tuto-overlay">
  <div class="login-box" style="text-align:center; width:450px;">
    <h2 id="tuto-title" style="color:var(--a);margin-bottom:15px">Bienvenue !</h2>
    <p id="tuto-text" style="font-size:14px;line-height:1.6;margin-bottom:25px;color:var(--t1)"></p>
    <button class="login-btn" onclick="nextTutoStep()">J'ai compris →</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <b style="color:var(--a); font-size:18px;">BenAI</b>
    <div style="margin-left:auto;display:flex;align-items:center;gap:15px">
      <span id="tb-username" style="font-size:13px;font-weight:600"></span>
      <button onclick="logout()" style="background:none;border:1px solid var(--b1);color:var(--t3);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px">Déconnexion</button>
    </div>
  </div>
  
  <div class="main">
    <div class="sidebar">
      <div class="sb-item active" id="nav-leads" onclick="showPage('leads')">📋 CRM Leads</div>
      <div class="sb-item" id="nav-annuaire" onclick="showPage('annuaire')">👥 Annuaire</div>
      <div class="sb-item" id="nav-admin" onclick="showPage('admin')" style="display:none">📊 Dashboard</div>
    </div>
    
    <div class="content">
      <div id="page-leads">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px;align-items:center">
          <h2>Gestion des Leads</h2>
          <button class="login-btn" style="width:auto;padding:8px 16px" onclick="openNewLead()">+ Nouveau Lead</button>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap">
           <button onclick="filterLeads('tous', this)" class="statut-btn selected" style="background:var(--s3);color:var(--t1)">Tous</button>
           <button onclick="filterLeads('gris', this)" class="statut-btn" style="background:#88888820;color:#888">🔵 Non traité</button>
           <button onclick="filterLeads('vert', this)" class="statut-btn" style="background:var(--g2);color:var(--g)">🟢 Vendu</button>
           <button onclick="filterLeads('rouge', this)" class="statut-btn" style="background:var(--r2);color:var(--r)">🔴 Perdu</button>
           <button onclick="filterLeads('archive', this)" class="statut-btn" style="background:var(--b1);color:var(--t2);margin-left:auto">📁 Archives</button>
        </div>
        <div id="leads-list"></div>
      </div>

      <div id="page-admin" style="display:none"></div>

      <div id="page-annuaire" style="display:none">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px">
          <h2>Annuaire Employés</h2>
          <button class="login-btn" style="width:auto;padding:8px 16px" onclick="openNewEmp()">+ Employé</button>
        </div>
        <div id="annuaire-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px"></div>
      </div>
    </div>
  </div>
</div>

<div id="lead-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1500;align-items:center;justify-content:center">
  <div class="login-box" style="width:500px; max-height:90vh; overflow-y:auto;">
    <h3 id="modal-title" style="margin-bottom:20px">Détails Lead</h3>
    <div class="form-row">
      <div><div class="form-label">Nom</div><input type="text" id="lead-nom" class="login-input" placeholder="Nom du client"></div>
      <div><div class="form-label">Téléphone</div><input type="text" id="lead-tel" class="login-input" placeholder="06 00 00 00 00"></div>
    </div>
    <div class="form-row">
      <div><div class="form-label">Secteur</div>
        <select id="lead-secteur" class="login-input">
          <option value="nimes">Nîmes</option>
          <option value="avignon">Avignon</option>
        </select>
      </div>
      <div id="wrap-attribution" style="display:none"><div class="form-label">Attribution</div>
        <select id="lead-commercial" class="login-input"><option value="">Non attribué</option></select>
      </div>
    </div>
    
    <div class="form-label">Statut</div>
    <div style="display:flex;gap:5px;margin-bottom:15px;flex-wrap:wrap">
      <button class="statut-btn selected" style="background:#88888820;color:#888" onclick="setStatut('gris',this)">Gris</button>
      <button class="statut-btn" style="background:var(--bl2);color:var(--bl)" onclick="setStatut('rdv',this)">RDV Pris</button>
      <button class="statut-btn" style="background:var(--y2);color:var(--y)" onclick="setStatut('jaune',this)">Devis</button>
      <button class="statut-btn" style="background:var(--g2);color:var(--g)" onclick="setStatut('vert',this)">Vendu</button>
      <button class="statut-btn" style="background:var(--r2);color:var(--r)" onclick="setStatut('rouge',this)">Perdu</button>
    </div>
    
    <div id="vendu-fields" style="display:none;margin-bottom:10px;">
       <div class="form-label">Prix Vendu HT</div>
       <input type="number" id="lead-prix" class="login-input" placeholder="Ex: 4500">
    </div>
    <div id="perdu-fields" style="display:none;margin-bottom:10px;">
       <div class="form-label">Raison Perte</div>
       <select id="lead-raison" class="login-input">
          <option value="Budget">Budget insuffisant</option>
          <option value="Concurrent">Concurrent choisi</option>
          <option value="Annulé">Projet annulé</option>
       </select>
    </div>

    <div id="lead-timeline" style="margin:15px 0; background:var(--s2); padding:10px; border-radius:8px; max-height:100px; overflow-y:auto; display:none;"></div>
    
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="login-btn" onclick="saveLead()">Enregistrer</button>
      <button id="btn-archive" class="login-btn" style="background:var(--s3)" onclick="archiverLeadActuel()">Archiver</button>
      <button class="login-btn" style="background:var(--r)" onclick="closeModal()">Fermer</button>
    </div>
  </div>
</div>

<div id="emp-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1500;align-items:center;justify-content:center">
  <div class="login-box" style="width:450px;">
    <h3 style="margin-bottom:20px">Fiche Employé</h3>
    <div class="form-row">
      <div><div class="form-label">Prénom</div><input type="text" id="emp-prenom" class="login-input"></div>
      <div><div class="form-label">Nom</div><input type="text" id="emp-nom" class="login-input"></div>
    </div>
    <div class="form-row">
      <div><div class="form-label">Rôle / Fonction</div><input type="text" id="emp-role" class="login-input"></div>
      <div><div class="form-label">Société</div>
        <select id="emp-societe" class="login-input">
          <option value="nemausus">Nemausus</option>
          <option value="lambert">Lambert</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div><div class="form-label">Véhicule (Modèle)</div><input type="text" id="emp-vehicule-modele" class="login-input" placeholder="Ex: Master"></div>
      <div><div class="form-label">Immatriculation</div><input type="text" id="emp-vehicule-immat" class="login-input" placeholder="AA-123-BB"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="login-btn" onclick="saveEmploye()">Enregistrer</button>
      <button class="login-btn" style="background:var(--r)" onclick="document.getElementById('emp-modal').style.display='none'">Fermer</button>
    </div>
  </div>
</div>

<script>
// =========================================================
// DONNÉES ET SÉCURITÉ v3.16
// =========================================================
let currentUser = null;
let currentLeadId = null;
let currentEmpId = null;
let selectedStatut = 'gris';
let leadFilter = 'tous';

function hashPwd(pwd) {
  if (!pwd || pwd.startsWith('h_')) return pwd;
  let hash = 0;
  for (let i = 0; i < pwd.length; i++) {
    hash = ((hash << 5) - hash) + pwd.charCodeAt(i);
    hash |= 0;
  }
  return 'h_' + Math.abs(hash).toString(36);
}

function getLeads() { return JSON.parse(localStorage.getItem('benai_leads') || '[]'); }
function saveLeads(l) { localStorage.setItem('benai_leads', JSON.stringify(l)); }
function getAnnuaire() { return JSON.parse(localStorage.getItem('benai_annuaire') || '[]'); }
function saveAnnuaire(a) { localStorage.setItem('benai_annuaire', JSON.stringify(a)); }

// =========================================================
// CONNEXION ET TUTORIELS
// =========================================================
function login() {
  const uid = document.getElementById('login-user').value.toLowerCase().trim();
  const pwd = document.getElementById('login-pwd').value;
  const err = document.getElementById('login-err');

  const pwds = JSON.parse(localStorage.getItem('benai_pwds') || '{"benjamin":"1234"}');
  const extras = JSON.parse(localStorage.getItem('benai_extra_users') || '[]');

  let userObj = null;
  if (uid === 'benjamin') {
    userObj = { id: 'benjamin', name: 'Benjamin', role: 'admin', societe: 'les-deux' };
  } else {
    userObj = extras.find(x => x.id === uid);
  }

  if (userObj) {
    const storedPwd = pwds[uid] || '1234';
    if (pwd === storedPwd || hashPwd(pwd) === storedPwd) {
      // Hachage automatique si en clair
      if (!storedPwd.startsWith('h_') && storedPwd !== '1234') {
        pwds[uid] = hashPwd(pwd);
        localStorage.setItem('benai_pwds', JSON.stringify(pwds));
      }
      currentUser = userObj;
      startApp();
      return;
    }
  }
  err.textContent = "Identifiant ou mot de passe incorrect";
}

function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('tb-username').textContent = currentUser.name;
  
  if (currentUser.role === 'admin' || currentUser.role === 'directeur_co') {
    document.getElementById('nav-admin').style.display = 'flex';
  }

  // Tutos bloquants
  if (currentUser.id !== 'benjamin') {
    const done = localStorage.getItem('tuto_done_' + currentUser.id);
    if (!done) showTuto();
  }

  showPage('leads');
}

function logout() { location.reload(); }

// =========================================================
// GESTION DES TUTOS OBLIGATOIRES
// =========================================================
const TUTOS = {
  admin: [
    { t: "Dashboard", c: "Benjamin, le nouveau Dashboard calcule le Panier Moyen." }
  ],
  commercial: [
    { t: "Tes Leads", c: "Ici sont regroupés tes contacts. N'oublie pas de mettre à jour tes statuts (Devis, Vendu)." },
    { t: "Tracé d'Appels", c: "Clique sur le bouton 'Appeler'. BenAI horodatera automatiquement l'appel dans l'historique du lead." }
  ],
  directeur_co: [
    { t: "Pilotage", c: "Tu peux voir les leads non-attribués et suivre le classement des commerciaux." },
    { t: "Panier Moyen", c: "Le Dashboard calcule automatiquement le panier moyen et analyse les pertes." }
  ]
};
let tutoStep = 0;

function showTuto() {
  const roleTuto = TUTOS[currentUser.role] || TUTOS.commercial;
  document.getElementById('tuto-title').textContent = roleTuto[tutoStep].t;
  document.getElementById('tuto-text').textContent = roleTuto[tutoStep].c;
  document.getElementById('tuto-overlay').style.display = 'flex';
}

function nextTutoStep() {
  const roleTuto = TUTOS[currentUser.role] || TUTOS.commercial;
  tutoStep++;
  if (tutoStep >= roleTuto.length) {
    localStorage.setItem('tuto_done_' + currentUser.id, '1');
    document.getElementById('tuto-overlay').style.display = 'none';
  } else {
    showTuto();
  }
}

// =========================================================
// NAVIGATION ET VUES
// =========================================================
function showPage(p) {
  document.getElementById('page-leads').style.display = p === 'leads' ? 'block' : 'none';
  document.getElementById('page-admin').style.display = p === 'admin' ? 'block' : 'none';
  document.getElementById('page-annuaire').style.display = p === 'annuaire' ? 'block' : 'none';
  
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + p).classList.add('active');

  if (p === 'leads') renderLeads();
  if (p === 'admin') renderAdmin();
  if (p === 'annuaire') renderAnnuaire();
}

// =========================================================
// LOGIQUE CRM & ATTRIBUTION
// =========================================================
function getAutoAttribution(societe) {
  const users = JSON.parse(localStorage.getItem('benai_extra_users') || '[]');
  const hasDirCo = users.some(u => u.role === 'directeur_co' && (u.societe === societe || u.societe === 'les-deux'));
  if (hasDirCo) return null; // Le Dir Co dispatche
  
  const comms = users.filter(u => u.role === 'commercial' && (u.societe === societe || u.societe === 'les-deux'));
  return comms.length === 1 ? comms[0].id : null;
}

function makeCallLink(tel, id) {
  if(!tel) return '';
  const clean = tel.replace(/\s/g,'');
  const tracking = id ? `trackCall(${id});` : '';
  return `<a href="tel:${clean}" onclick="${tracking} event.stopPropagation()" class="btn-call">📞 Appeler</a>`;
}

function trackCall(id) {
  const leads = getLeads();
  const idx = leads.findIndex(l => l.id === id);
  if(idx !== -1) {
    addLeadTimelineEntry(leads[idx], '📞 Appel sortant effectué', currentUser.name);
    saveLeads(leads);
  }
}

function addLeadTimelineEntry(lead, action, user) {
  if(!lead.timeline) lead.timeline = [];
  lead.timeline.push({
    date: new Date().toLocaleString('fr-FR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}),
    user: user,
    action: action
  });
}

function renderLeads() {
  const list = document.getElementById('leads-list');
  let leads = getLeads();

  // Filtrage Rôle
  if (currentUser.role === 'commercial') leads = leads.filter(l => l.commercial === currentUser.id);
  
  // Filtrage Statut / Archive
  if (leadFilter === 'archive') leads = leads.filter(l => l.archive);
  else {
    leads = leads.filter(l => !l.archive);
    if (leadFilter !== 'tous') leads = leads.filter(l => l.statut === leadFilter);
  }

  if (leads.length === 0) {
    list.innerHTML = '<div style="color:var(--t3);text-align:center;padding:20px">Aucun lead trouvé.</div>';
    return;
  }

  list.innerHTML = leads.map(l => {
    const users = JSON.parse(localStorage.getItem('benai_extra_users') || '[]');
    const commName = users.find(u => u.id === l.commercial)?.name || 'Non attribué';
    const bgCls = {gris:'#88888820', rdv:'var(--bl2)', jaune:'var(--y2)', vert:'var(--g2)', rouge:'var(--r2)'}[l.statut] || '#88888820';
    const colorCls = {gris:'#888', rdv:'var(--bl)', jaune:'var(--y)', vert:'var(--g)', rouge:'var(--r)'}[l.statut] || '#888';
    
    return `
    <div class="lead-card" onclick="openLead(${l.id})" style="border-left:4px solid ${colorCls}">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
         <b style="font-size:16px">${l.nom}</b>
         <span style="font-size:10px; background:${bgCls}; color:${colorCls}; padding:3px 8px; border-radius:10px; font-weight:bold">${l.statut.toUpperCase()}</span>
      </div>
      <div style="font-size:12px; color:var(--t2); margin-bottom:8px">📍 ${l.secteur} · 👤 ${commName}</div>
      <div style="display:flex; justify-content:space-between; align-items:center">
         ${makeCallLink(l.telephone, l.id)}
         ${l.prix_vendu ? `<strong style="color:var(--g);font-size:14px">${l.prix_vendu} €</strong>` : ''}
      </div>
    </div>`;
  }).join('');
}

function filterLeads(f, btn) {
  leadFilter = f;
  document.querySelectorAll('#page-leads .statut-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  renderLeads();
}

// =========================================================
// ACTIONS LEAD (Ouverture, Sauvegarde, Archivage)
// =========================================================
function openNewLead() {
  currentLeadId = null;
  document.getElementById('modal-title').textContent = "Nouveau Lead";
  document.getElementById('lead-nom').value = "";
  document.getElementById('lead-tel').value = "";
  document.getElementById('lead-prix').value = "";
  document.getElementById('btn-archive').style.display = "none";
  document.getElementById('lead-timeline').style.display = "none";
  
  // Remplir Attribution si Admin/DirCo
  const wrapAttr = document.getElementById('wrap-attribution');
  if (currentUser.role === 'admin' || currentUser.role === 'directeur_co') {
    wrapAttr.style.display = 'block';
    const users = JSON.parse(localStorage.getItem('benai_extra_users') || '[]');
    const comms = users.filter(u => u.role === 'commercial');
    document.getElementById('lead-commercial').innerHTML = '<option value="">Non attribué</option>' + 
      comms.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  } else {
    wrapAttr.style.display = 'none';
  }

  setStatut('gris', document.querySelector('.statut-btn.selected'));
  document.getElementById('lead-modal').style.display = "flex";
}

function openLead(id) {
  const l = getLeads().find(x => x.id === id);
  if(!l) return;
  currentLeadId = id;
  document.getElementById('modal-title').textContent = "Modifier Lead";
  document.getElementById('lead-nom').value = l.nom;
  document.getElementById('lead-tel').value = l.telephone;
  document.getElementById('lead-secteur').value = l.secteur;
  
  if (currentUser.role === 'admin' || currentUser.role === 'directeur_co') {
    document.getElementById('wrap-attribution').style.display = 'block';
    const users = JSON.parse(localStorage.getItem('benai_extra_users') || '[]');
    const comms = users.filter(u => u.role === 'commercial');
    document.getElementById('lead-commercial').innerHTML = '<option value="">Non attribué</option>' + 
      comms.map(c => `<option value="${c.id}" ${c.id===l.commercial?'selected':''}>${c.name}</option>`).join('');
  }

  document.getElementById('lead-prix').value = l.prix_vendu || "";
  document.getElementById('lead-raison').value = l.raison_mort || "Budget";
  
  // Selection Statut Visuel
  document.querySelectorAll('.statut-btn').forEach(b => {
    if(b.textContent.toLowerCase().includes(l.statut.toLowerCase())) setStatut(l.statut, b);
  });

  // Bouton Archivage
  const btnArch = document.getElementById('btn-archive');
  btnArch.style.display = "block";
  btnArch.textContent = l.archive ? "🔄 Réouvrir" : "📁 Archiver";

  // Timeline
  const tl = document.getElementById('lead-timeline');
  if(l.timeline && l.timeline.length > 0) {
    tl.style.display = 'block';
    tl.innerHTML = l.timeline.slice().reverse().map(t => `<div class="timeline-item"><strong style="color:var(--a)">${t.date}</strong> - ${t.user} : ${t.action}</div>`).join('');
  } else {
    tl.style.display = 'none';
  }

  document.getElementById('lead-modal').style.display = "flex";
}

function setStatut(s, btn) {
  selectedStatut = s;
  document.querySelectorAll('#lead-modal .statut-btn').forEach(b => b.classList.remove('selected'));
  if(btn) btn.classList.add('selected');
  document.getElementById('vendu-fields').style.display = s === 'vert' ? 'block' : 'none';
  document.getElementById('perdu-fields').style.display = s === 'rouge' ? 'block' : 'none';
}

function saveLead() {
  const leads = getLeads();
  const secteur = document.getElementById('lead-secteur').value;
  const data = {
    nom: document.getElementById('lead-nom').value,
    telephone: document.getElementById('lead-tel').value,
    secteur: secteur,
    statut: selectedStatut,
    prix_vendu: document.getElementById('lead-prix').value,
    raison_mort: document.getElementById('lead-raison').value,
    archive: false
  };

  if (currentUser.role === 'admin' || currentUser.role === 'directeur_co') {
     data.commercial = document.getElementById('lead-commercial').value || null;
  }

  if (currentLeadId) {
    const idx = leads.findIndex(x => x.id === currentLeadId);
    if(leads[idx].statut !== selectedStatut) addLeadTimelineEntry(leads[idx], `Statut modifié : ${selectedStatut}`, currentUser.name);
    leads[idx] = { ...leads[idx], ...data };
  } else {
    data.id = Date.now();
    data.date_creation = new Date().toISOString();
    data.timeline = [];
    if(!data.commercial) data.commercial = getAutoAttribution(secteur === 'nimes' ? 'nemausus' : 'lambert');
    addLeadTimelineEntry(data, 'Création du lead', currentUser.name);
    leads.unshift(data);
  }
  
  saveLeads(leads);
  closeModal();
  renderLeads();
}

function archiverLeadActuel() {
  const leads = getLeads();
  const idx = leads.findIndex(l => l.id === currentLeadId);
  if(idx !== -1) {
    const isArchiving = !leads[idx].archive;
    leads[idx].archive = isArchiving;
    if(!isArchiving) leads[idx].statut = 'gris'; // Revient à traiter si réouvert
    addLeadTimelineEntry(leads[idx], isArchiving ? '📁 Lead archivé' : '🔄 Lead réouvert', currentUser.name);
    saveLeads(leads);
    closeModal();
    renderLeads();
  }
}

function closeModal() { 
  document.getElementById('lead-modal').style.display = "none"; 
}

// =========================================================
// DASHBOARD ADMIN (Panier Moyen et Pertes)
// =========================================================
function renderAdmin() {
  const leads = getLeads().filter(l => !l.archive);
  const ventes = leads.filter(l => l.statut === 'vert');
  const caTotal = ventes.reduce((s, l) => s + (Number(l.prix_vendu) || 0), 0);
  const panierMoyen = ventes.length > 0 ? (caTotal / ventes.length).toFixed(0) : 0;

  const perdues = leads.filter(l => l.statut === 'rouge');
  const raisons = perdues.reduce((acc, l) => {
    const r = l.raison_mort || 'Non spécifié';
    acc[r] = (acc[r] || 0) + 1;
    return acc;
  }, {});

  document.getElementById('page-admin').innerHTML = `
    <h2>Dashboard Performances</h2>
    <div style="display:flex; gap:15px; margin-top:20px; margin-bottom:20px; flex-wrap:wrap">
      <div class="stat-box"><div class="stat-box-val">${caTotal.toLocaleString('fr-FR')} €</div><div class="stat-box-lbl">CA Total</div></div>
      <div class="stat-box"><div class="stat-box-val" style="color:var(--g)">${panierMoyen.toLocaleString('fr-FR')} €</div><div class="stat-box-lbl">Panier Moyen</div></div>
      <div class="stat-box"><div class="stat-box-val">${ventes.length}</div><div class="stat-box-lbl">Ventes</div></div>
    </div>
    
    <div style="background:var(--s2); padding:20px; border-radius:12px; border:1px solid var(--b1)">
      <h3 style="color:var(--r); margin-bottom:15px">Analyse des Pertes (${perdues.length})</h3>
      ${Object.entries(raisons).map(([r, n]) => `
        <div style="display:flex; justify-content:space-between; background:var(--s3); padding:10px; border-radius:6px; margin-bottom:5px;">
           <span>${r}</span>
           <span style="font-weight:bold">${n} leads (${((n/perdues.length)*100).toFixed(0)}%)</span>
        </div>
      `).join('') || '<span style="color:var(--t3)">Aucune perte enregistrée.</span>'}
    </div>
  `;
}

// =========================================================
// ANNUAIRE (Véhicules)
// =========================================================
function renderAnnuaire() {
  const list = document.getElementById('annuaire-list');
  const ann = getAnnuaire();
  
  list.innerHTML = ann.map(e => `
    <div class="lead-card" style="cursor:default">
      <div style="display:flex; justify-content:space-between">
         <b style="font-size:18px">${e.prenom} ${e.nom}</b>
         <button onclick="editEmploye(${e.id})" style="background:none;border:none;color:var(--a);cursor:pointer">✏️ Editer</button>
      </div>
      <div style="color:var(--t2); font-size:12px; margin-bottom:10px">${e.role} · ${e.societe}</div>
      ${e.vehicule_immat ? `
        <div style="background:var(--s3); padding:8px; border-radius:6px; font-size:11px; color:var(--t2); border-left:3px solid var(--bl)">
          🚗 <b>${e.vehicule_modele || 'Véhicule'}</b> : <span style="font-family:monospace; background:var(--b1); padding:2px 4px; color:white; border-radius:4px">${e.vehicule_immat}</span>
        </div>
      ` : ''}
    </div>
  `).join('');
}

function openNewEmp() {
  currentEmpId = null;
  document.getElementById('emp-prenom').value = '';
  document.getElementById('emp-nom').value = '';
  document.getElementById('emp-role').value = '';
  document.getElementById('emp-societe').value = 'nemausus';
  document.getElementById('emp-vehicule-modele').value = '';
  document.getElementById('emp-vehicule-immat').value = '';
  document.getElementById('emp-modal').style.display = 'flex';
}

function editEmploye(id) {
  const e = getAnnuaire().find(x => x.id === id);
  if(!e) return;
  currentEmpId = id;
  document.getElementById('emp-prenom').value = e.prenom;
  document.getElementById('emp-nom').value = e.nom;
  document.getElementById('emp-role').value = e.role || '';
  document.getElementById('emp-societe').value = e.societe || 'nemausus';
  document.getElementById('emp-vehicule-modele').value = e.vehicule_modele || '';
  document.getElementById('emp-vehicule-immat').value = e.vehicule_immat || '';
  document.getElementById('emp-modal').style.display = 'flex';
}

function saveEmploye() {
  const ann = getAnnuaire();
  const data = {
    prenom: document.getElementById('emp-prenom').value,
    nom: document.getElementById('emp-nom').value,
    role: document.getElementById('emp-role').value,
    societe: document.getElementById('emp-societe').value,
    vehicule_modele: document.getElementById('emp-vehicule-modele').value,
    vehicule_immat: document.getElementById('emp-vehicule-immat').value
  };

  if(currentEmpId) {
    const idx = ann.findIndex(x => x.id === currentEmpId);
    ann[idx] = {...ann[idx], ...data};
  } else {
    data.id = Date.now();
    ann.push(data);
  }
  
  saveAnnuaire(ann);
  document.getElementById('emp-modal').style.display = 'none';
  renderAnnuaire();
}
