<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E8943A">
<title>BenAI - Mode Boss</title>
<style>
/* --- COPIE DU STYLE DE BASE --- */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#080808;--s1:#101010;--s2:#161616;--s3:#1E1E1E;--b1:#242424;--b2:#2E2E2E;
  --t1:#F2EFE8;--t2:#A8A49C;--t3:#5A5650;
  --a:#E8943A;--a2:#C4711A;--a3:rgba(232,148,58,.12);
  --g:#22C55E;--g2:rgba(34,197,94,.12);
  --r:#F87171;--r2:rgba(248,113,113,.12);
  --bl:#60A5FA;--bl2:rgba(96,165,250,.12);
  --nem:#E8943A;--lam:#60A5FA;
}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);}
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000;}
.login-box{width:380px;padding:40px;background:var(--s1);border:1px solid var(--b1);border-radius:20px;text-align:center;}
.logo-mark{width:56px;height:56px;background:linear-gradient(135deg,var(--a),var(--a2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin:0 auto 12px;}
.login-input{width:100%;padding:12px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;color:#fff;margin-bottom:15px;outline:none;}
.login-btn{width:100%;padding:14px;background:var(--a);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;}
#app{display:none;height:100%;flex-direction:column;}
#app.visible{display:flex;}
/* (On garde le reste de ton style ici) */
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="logo-mark">B</div>
    <h1 style="margin-bottom:20px">BenAI</h1>
    <input type="text" id="login-user" class="login-input" placeholder="Identifiant">
    <input type="password" id="login-pwd" class="login-input" placeholder="Mot de passe">
    <button onclick="login()" class="login-btn">Accès Boss →</button>
    <div id="login-err" style="color:var(--r);margin-top:10px;font-size:12px"></div>
  </div>
</div>

<div id="app">
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // 1. CONFIGURATION (R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)
  const _sbUrl = 'https://wwrdnvvjdfxkzzqbwlzy.supabase.co'; 
  const _sbKey = 'sb_publishable_jd--ZbBaMhayWA8nvZlB-A_LFBhnvgD';
  const _claudeKey = 'METS_TA_CLE_CLAUDE_ICI'; 
  
  const _client = window.supabase.createClient(_sbUrl, _sbKey);

  // Forcer la clé Claude
  if (_claudeKey && _claudeKey.startsWith('sk-')) {
      localStorage.setItem('benai_api', _claudeKey);
  }

  // 2. MODE BOSS : DÉVERROUILLAGE TOTAL
  function activerModeBoss() {
    const menus = ['nav-benai', 'nav-notes', 'nav-messages', 'nav-sav', 'nav-leads', 'nav-absences', 'nav-annuaire', 'nav-paie', 'nav-admin'];
    menus.forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.display = 'flex'; el.style.visibility = 'visible'; }
    });
    // On force Benjamin en ADMIN
    if (window.currentUser && window.currentUser.nom === 'benjamin') {
        window.currentUser.role = 'admin';
        window.currentRole = 'admin';
    }
  }

  // 3. LOGIN SUPABASE
  async function login() {
    const user = document.getElementById('login-user').value.toLowerCase().trim();
    const pass = document.getElementById('login-pwd').value;
    const err = document.getElementById('login-err');

    try {
      const { data, error } = await _client.from('employes').select('*').eq('nom', user).eq('mot_de_passe', pass).single();
      if (error || !data) {
        err.textContent = "❌ Erreur d'accès"; return;
      }

      window.currentUser = { 
        id: data.nom, nom: data.nom, 
        name: data.nom.charAt(0).toUpperCase() + data.nom.slice(1), 
        role: 'admin', color: '#E8943A', initial: 'B' 
      };
      
      localStorage.setItem('benai_tutorial_finished', 'true');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      
      // On lance tes fonctions de base si elles existent
      if (typeof initApp === "function") initApp(); 
      setTimeout(activerModeBoss, 500);

    } catch (e) { console.error(e); }
  }

  // 4. SYNCHRO AUTOMATIQUE CRM & SAV
  const originalShowPage = window.showPage;
  window.showPage = async function(page) {
    if (page === 'leads') {
        const { data } = await _client.from('leads').select('*');
        if (data) localStorage.setItem('benai_leads', JSON.stringify(data));
    }
    if (page === 'sav') {
        const { data } = await _client.from('sav').select('*');
        if (data) {
            let mem = JSON.parse(localStorage.getItem('benai_v3') || '{}');
            mem.sav = data;
            localStorage.setItem('benai_v3', JSON.stringify(mem));
        }
    }
    if (typeof originalShowPage === "function") originalShowPage(page);
  };
</script>
</body>
</html>
