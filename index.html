<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenAI v3.16</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#080808;--s1:#101010;--s2:#161616;--s3:#1E1E1E;--b1:#242424;--b2:#2E2E2E;
  --t1:#F2EFE8;--t2:#A8A49C;--t3:#5A5650;
  --a:#E8943A;--a2:#C4711A;--a3:rgba(232,148,58,.12);
  --g:#22C55E;--g2:rgba(34,197,94,.12);
  --r:#F87171;--r2:rgba(248,113,113,.12);
  --bl:#60A5FA;--bl2:rgba(96,165,250,.12);
  --y:#FBBF24;--y2:rgba(251,191,36,.12);
  --nem:#E8943A;--lam:#60A5FA;
}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);}
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;background-image:radial-gradient(ellipse at 30% 20%,rgba(232,148,58,.06) 0%,transparent 60%);}
.login-box{width:380px;padding:40px 36px;background:var(--s1);border:1px solid var(--b1);border-radius:20px;box-shadow:0 40px 80px rgba(0,0,0,.6);}
.login-input{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;color:var(--t1);font-size:14px;outline:none;margin-bottom:14px;}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
#app{display:none;height:100%;flex-direction:column;}
#app.visible{display:flex;}
.topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:12px;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow-y:auto;}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;margin:2px 8px;}
.sb-item.active{background:var(--a3);color:var(--a);}
.lead-card{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:13px 15px;cursor:pointer;margin-bottom:8px;position:relative;}
.lead-card.alerte24{border-color:var(--r);box-shadow:0 0 0 2px rgba(248,113,113,.2);}
.statut-btn{padding:7px 14px;border-radius:8px;border:2px solid transparent;font-size:12px;font-weight:700;cursor:pointer;}
.selected{border-color:white!important;}
.sb-gris{background:#88888820;color:#888;}
.sb-rdv{background:var(--bl2);color:var(--bl);}
.sb-jaune{background:var(--y2);color:var(--y);}
.sb-vert{background:var(--g2);color:var(--g);}
.sb-rouge{background:var(--r2);color:var(--r);}
.stat-box{background:var(--s3);border-radius:10px;padding:12px;text-align:center;flex:1;}
.stat-box-val{font-size:22px;font-weight:800;}
/* TUTO */
#tuto-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.tuto-box{width:480px;background:var(--s1);padding:36px;border-radius:20px;text-align:center;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin:0 auto 12px;">B</div>
      <h1 style="font-size:22px;font-weight:700;">BenAI v3.16</h1>
    </div>
    <input type="text" class="login-input" id="login-user" placeholder="Identifiant">
    <input type="password" class="login-input" id="login-pwd" placeholder="Mot de passe">
    <button class="login-btn" onclick="login()">Se connecter →</button>
    <div id="login-err" style="color:var(--r);font-size:12px;text-align:center;margin-top:10px"></div>
  </div>
</div>

<div id="tuto-overlay">
  <div class="tuto-box">
    <div id="tuto-icon" style="font-size:48px;margin-bottom:16px">👋</div>
    <h2 id="tuto-title" style="margin-bottom:10px">Bienvenue !</h2>
    <p id="tuto-desc" style="color:var(--t2);line-height:1.6;margin-bottom:24px"></p>
    <button class="login-btn" id="tuto-next" onclick="nextTutoSlide()">Suivant →</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <b style="color:var(--a);margin-right:15px">BenAI</b>
    <div id="tb-user" style="margin-left:auto;display:flex;align-items:center;gap:12px">
      <span id="tb-username" style="font-size:13px;color:var(--t2)"></span>
      <button onclick="logout()" style="background:none;border:1px solid var(--b1);padding:4px 8px;border-radius:6px;color:var(--t3);cursor:pointer">Déconnexion</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
       <div class="sb-item active" onclick="showPage('leads')">📋 CRM Leads</div>
       <div class="sb-item" onclick="showPage('annuaire')">👥 Annuaire</div>
       <div id="nav-admin" class="sb-item" onclick="showPage('admin')" style="display:none">📊 Dashboard</div>
    </div>
    <div class="content">
      <div id="page-leads" style="padding:20px;overflow-y:auto">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px">
          <h2>Leads CRM</h2>
          <button class="login-btn" style="width:auto;padding:8px 16px" onclick="openNewLead()">+ Nouveau lead</button>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:15px">
           <button onclick="filterLeads('tous')" class="statut-btn sb-gris">Tous</button>
           <button onclick="filterLeads('archive')" class="statut-btn" style="background:var(--s3);color:var(--t2)">📁 Archives</button>
        </div>
        <div id="leads-list"></div>
      </div>
      <div id="page-admin" style="display:none;padding:20px;overflow-y:auto"></div>
      <div id="page-annuaire" style="display:none;padding:20px;overflow-y:auto"></div>
    </div>
  </div>
</div>

<div id="lead-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center">
  <div class="login-box" style="width:500px;background:var(--s1)">
    <h3 id="modal-title" style="margin-bottom:15px">Fiche Lead</h3>
    <input type="text" id="lead-nom" class="login-input" placeholder="Nom">
    <input type="text" id="lead-tel" class="login-input" placeholder="Téléphone">
    <select id="lead-secteur" class="login-input">
      <option value="nimes">Nîmes</option>
      <option value="avignon">Avignon</option>
    </select>
    <div style="display:flex;gap:5px;margin-bottom:15px">
       <button class="statut-btn sb-gris" onclick="setStatut('gris',this)">Gris</button>
       <button class="statut-btn sb-vert" onclick="setStatut('vert',this)">Vendu</button>
       <button class="statut-btn sb-rouge" onclick="setStatut('rouge',this)">Perdu</button>
    </div>
    <div id="vendu-fields" style="display:none">
       <input type="number" id="lead-prix" class="login-input" placeholder="Prix Vendu HT (€)">
    </div>
    <div id="perdu-fields" style="display:none">
       <select id="lead-raison" class="login-input">
          <option value="">Raison de la perte...</option>
          <option value="Concurrent">Concurrent choisi</option>
          <option value="Budget">Budget insuffisant</option>
          <option value="Annulé">Projet annulé</option>
       </select>
    </div>
    <div style="display:flex;gap:8px">
      <button class="login-btn" style="flex:1" onclick="saveLead()">Enregistrer</button>
      <button id="btn-archive" class="login-btn" style="background:var(--s3)" onclick="archiveCurrentLead()">Archiver</button>
      <button class="login-btn" style="background:var(--r)" onclick="closeLeadModal()">Fermer</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// LOGIQUE CORE v3.16
// ══════════════════════════════════════════

let currentUser = null;
let currentLeadId = null;
let selectedStatut = 'gris';
let leadFilter = 'tous';

// 1. SÉCURITÉ : HACHAGE
function hashPwd(p) {
    if (!p || p.startsWith('h_')) return p;
    let h = 0; for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i), h |= 0;
    return 'h_' + Math.abs(h).toString(36);
}

// 2. DONNÉES
function getLeads() { return JSON.parse(localStorage.getItem('benai_leads') || '[]'); }
function saveLeads(l) { localStorage.setItem('benai_leads', JSON.stringify(l)); }
function getPwds() { return JSON.parse(localStorage.getItem('benai_pwds') || '{"benjamin":"1234"}'); }

// 3. LOGIN & MIGRATION
function login() {
    const uid = document.getElementById('login-user').value.toLowerCase();
    const pwd = document.getElementById('login-pwd').value;
    const err = document.getElementById('login-err');
    
    const pwds = getPwds();
    const stored = pwds[uid];

    if (uid === 'benjamin' && (pwd === '1234' || stored === hashPwd(pwd))) {
        currentUser = { id: 'benjamin', name: 'Benjamin', role: 'admin' };
    } else {
        const extras = JSON.parse(localStorage.getItem('benai_extra_users') || '[]');
        const u = extras.find(x => x.id === uid);
        if (u && (stored === pwd || stored === hashPwd(pwd))) {
            currentUser = u;
        }
    }

    if (currentUser) {
        // Migration auto vers hachage
        if (pwds[uid] && !pwds[uid].startsWith('h_')) {
            pwds[uid] = hashPwd(pwd);
            localStorage.setItem('benai_pwds', JSON.stringify(pwds));
        }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').classList.add('visible');
        document.getElementById('tb-username').textContent = currentUser.name;
        if(currentUser.role === 'admin') document.getElementById('nav-admin').style.display = 'flex';
        checkTuto();
        renderLeads();
    } else {
        err.textContent = "Identifiant ou mot de passe incorrect";
    }
}

// 4. CRM & ATTRIBUTION
function getAutoAttribution(societe) {
    const users = JSON.parse(localStorage.getItem('benai_extra_users') || '[]');
    const hasDirCo = users.some(u => u.role === 'directeur_co' && (u.societe === societe || u.societe === 'les-deux'));
    if (hasDirCo) return null;
    const comms = users.filter(u => u.role === 'commercial' && (u.societe === societe || u.societe === 'les-deux'));
    return comms.length === 1 ? comms[0].id : null;
}

function trackCall(id) {
    const leads = getLeads();
    const l = leads.find(x => x.id === id);
    if (l) {
        if (!l.timeline) l.timeline = [];
        l.timeline.push({ date: new Date().toLocaleString(), action: "📞 Appel tracé", user: currentUser.name });
        saveLeads(leads);
        showDriveNotif("Appel enregistré dans l'historique");
    }
}

function renderLeads() {
    const list = document.getElementById('leads-list');
    let leads = getLeads();
    if (leadFilter === 'archive') leads = leads.filter(l => l.archive);
    else leads = leads.filter(l => !l.archive);

    list.innerHTML = leads.map(l => `
        <div class="lead-card" onclick="openLead(${l.id})">
            <div style="display:flex;justify-content:space-between">
                <b>${l.nom}</b>
                <span class="lead-secteur" style="font-size:10px;background:var(--s3);padding:2px 6px;border-radius:4px">${l.secteur}</span>
            </div>
            <div style="margin-top:10px">
                <a href="tel:${l.telephone}" class="statut-btn sb-rdv" style="text-decoration:none;font-size:11px" onclick="event.stopPropagation(); trackCall(${l.id})">📞 Appeler</a>
            </div>
        </div>
    `).join('');
}

// 5. DASHBOARD & STATS
function renderAdmin() {
    const leads = getLeads().filter(l => !l.archive);
    const ventes = leads.filter(l => l.statut === 'vert');
    const caTotal = ventes.reduce((s, l) => s + (Number(l.prix_vendu) || 0), 0);
    const panierMoyen = ventes.length > 0 ? (caTotal / ventes.length).toFixed(0) : 0;

    const perdues = leads.filter(l => l.statut === 'rouge');
    const raisons = perdues.reduce((acc, l) => {
        const r = l.raison_mort || 'Autre';
        acc[r] = (acc[r] || 0) + 1;
        return acc;
    }, {});

    document.getElementById('page-admin').innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:25px">
            <div class="stat-box"><div class="stat-box-val">${caTotal.toLocaleString()} €</div><div style="font-size:10px;color:var(--t3)">CA TOTAL</div></div>
            <div class="stat-box"><div class="stat-box-val" style="color:var(--g)">${panierMoyen.toLocaleString()} €</div><div style="font-size:10px;color:var(--t3)">PANIER MOYEN</div></div>
            <div class="stat-box"><div class="stat-box-val">${ventes.length}</div><div style="font-size:10px;color:var(--t3)">VENTES</div></div>
        </div>
        <h3>Analyse des Pertes</h3>
        <div style="margin-top:15px">
            ${Object.entries(raisons).map(([r, n]) => `
                <div style="margin-bottom:8px">
                    <div style="font-size:12px;display:flex;justify-content:space-between"><span>${r}</span><span>${n} leads</span></div>
                    <div style="height:6px;background:var(--s3);border-radius:3px;margin-top:4px"><div style="height:100%;background:var(--r);width:${(n/perdues.length*100)}%;border-radius:3px"></div></div>
                </div>
            `).join('')}
        </div>
    `;
}

// 6. ACTIONS UI
function setStatut(s, btn) {
    selectedStatut = s;
    document.querySelectorAll('.statut-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('vendu-fields').style.display = s === 'vert' ? 'block' : 'none';
    document.getElementById('perdu-fields').style.display = s === 'rouge' ? 'block' : 'none';
}

function openLead(id) {
    const l = getLeads().find(x => x.id === id);
    currentLeadId = id;
    document.getElementById('modal-title').textContent = "Détails Lead";
    document.getElementById('lead-nom').value = l.nom;
    document.getElementById('lead-tel').value = l.telephone;
    document.getElementById('btn-archive').style.display = "block";
    document.getElementById('btn-archive').textContent = l.archive ? "🔄 Réouvrir" : "📁 Archiver";
    document.getElementById('lead-modal').style.display = "flex";
}

function archiveCurrentLead() {
    const leads = getLeads();
    const idx = leads.findIndex(x => x.id === currentLeadId);
    leads[idx].archive = !leads[idx].archive;
    if (!leads[idx].archive) leads[idx].statut = 'gris';
    saveLeads(leads);
    closeLeadModal();
    renderLeads();
}

function saveLead() {
    const leads = getLeads();
    const data = {
        nom: document.getElementById('lead-nom').value,
        telephone: document.getElementById('lead-tel').value,
        secteur: document.getElementById('lead-secteur').value,
        statut: selectedStatut,
        prix_vendu: document.getElementById('lead-prix').value,
        raison_mort: document.getElementById('lead-raison').value,
        archive: false
    };
    if (currentLeadId) {
        const idx = leads.findIndex(x => x.id === currentLeadId);
        leads[idx] = { ...leads[idx], ...data };
    } else {
        data.id = Date.now();
        data.commercial = getAutoAttribution(data.secteur);
        leads.unshift(data);
    }
    saveLeads(leads);
    closeLeadModal();
    renderLeads();
}

// [Gestion des Tutos par Rôle]
const TUTO_DATA = {
    commercial: [
        { t: "Bienvenue !", c: "Tes leads sont centralisés ici. BenAI trace tes appels automatiquement pour ton suivi." },
        { t: "Ventes HT", c: "Quand tu passes un lead en VERT (Vendu), pense à bien saisir le montant HT pour tes stats." }
    ],
    admin: [
        { t: "Dashboard Benjamin", c: "Le dashboard calcule désormais ton panier moyen en temps réel." }
    ]
};
let tutoIdx = 0;
function checkTuto() {
    if (currentUser.id === 'benjamin') return;
    if (!localStorage.getItem('tuto_done_' + currentUser.id)) {
        tutoIdx = 0; showTuto();
    }
}
function showTuto() {
    const steps = TUTO_DATA[currentUser.role] || TUTO_DATA.commercial;
    document.getElementById('tuto-title').textContent = steps[tutoIdx].t;
    document.getElementById('tuto-desc').textContent = steps[tutoIdx].c;
    document.getElementById('tuto-overlay').style.display = 'flex';
}
function nextTutoSlide() {
    const steps = TUTO_DATA[currentUser.role] || TUTO_DATA.commercial;
    tutoIdx++;
    if (tutoIdx >= steps.length) {
        localStorage.setItem('tuto_done_' + currentUser.id, '1');
        document.getElementById('tuto-overlay').style.display = 'none';
    } else showTuto();
}

function showPage(p) {
    document.getElementById('page-leads').style.display = p === 'leads' ? 'block' : 'none';
    document.getElementById('page-admin').style.display = p === 'admin' ? 'block' : 'none';
    if(p === 'admin') renderAdmin();
}
function filterLeads(f) { leadFilter = f; renderLeads(); }
function closeLeadModal() { document.getElementById('lead-modal').style.display = "none"; }
function showDriveNotif(m) { alert(m); }
function logout() { location.reload(); }
function openNewLead() { currentLeadId = null; document.getElementById('lead-modal').style.display = "flex"; }
</script>
</body>
</html>
