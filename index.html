<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenAI v3.16</title>
<style>
/* ... Tes styles CSS habituels ... */
:root { --a: #E8943A; --s1: #101010; --b1: #242424; --t1: #F2EFE8; --r: #F87171; }
body { background: #080808; color: var(--t1); font-family: 'Outfit', sans-serif; }
.tuto-lock { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
.btn-call { color: var(--a); text-decoration: none; font-weight: bold; border: 1px solid var(--a); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.stat-card { background: var(--s1); border: 1px solid var(--b1); padding: 15px; border-radius: 12px; }
</style>
</head>
<body>

<div id="tuto-blocker" class="tuto-lock" style="display:none">
    <div style="max-width:400px">
        <h2 id="tuto-title" style="color:var(--a);margin-bottom:15px"></h2>
        <p id="tuto-text" style="margin-bottom:25px; line-height:1.5"></p>
        <button onclick="nextTutoStep()" style="background:var(--a); border:none; padding:12px 30px; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer">Suivant</button>
    </div>
</div>

<script>
/* ================================================================
   BENAI v3.16 - CORE LOGIC
   ================================================================
*/

// 1. GESTION DES MOTS DE PASSE (HACHAGE)
function hashPwd(p) {
    if (!p || p.startsWith('h_')) return p;
    let h = 0; for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i), h |= 0;
    return 'h_' + Math.abs(h).toString(36);
}

// 2. ATTRIBUTION AUTOMATIQUE ( Lambert / Nemausus )
function getAutoAttribution(societeLead) {
    const allUsers = JSON.parse(localStorage.getItem('benai_extra_users') || '[]');
    // Si un Dir Co existe pour cette boîte, on ne fait rien (dispatch manuel)
    const hasDirCo = allUsers.some(u => u.role === 'directeur_co' && (u.societe === societeLead || u.societe === 'les-deux'));
    if (hasDirCo) return null;

    // Sinon, on cherche s'il y a un commercial unique
    const comms = allUsers.filter(u => u.role === 'commercial' && (u.societe === societeLead || u.societe === 'les-deux'));
    return comms.length === 1 ? comms[0].id : null;
}

// 3. TRACÉ AUTOMATIQUE DES APPELS
function trackCall(leadId) {
    let leads = JSON.parse(localStorage.getItem('benai_leads') || '[]');
    let l = leads.find(x => x.id === leadId);
    if (l) {
        if (!l.timeline) l.timeline = [];
        l.timeline.push({ 
            date: new Date().toISOString(), 
            user: currentUser.name, 
            action: "📞 Appel tracé via l'application" 
        });
        localStorage.setItem('benai_leads', JSON.stringify(leads));
        console.log("Appel tracé pour le lead " + leadId);
    }
}

// 4. PANIER MOYEN & ANALYSE PERTES (DASHBOARD)
function calculateDashboardStats() {
    const leads = JSON.parse(localStorage.getItem('benai_leads') || '[]').filter(l => !l.archive);
    const ventes = leads.filter(l => l.statut === 'vert');
    const perdues = leads.filter(l => l.statut === 'rouge');

    const caTotal = ventes.reduce((sum, l) => sum + (Number(l.prix_vendu) || 0), 0);
    const panierMoyen = ventes.length > 0 ? (caTotal / ventes.length).toFixed(0) : 0;

    const raisons = perdues.reduce((acc, l) => {
        const r = l.raison_mort || "Non spécifiée";
        acc[r] = (acc[r] || 0) + 1;
        return acc;
    }, {});

    return { caTotal, panierMoyen, nbVentes: ventes.length, raisonsPerte: raisons };
}

// 5. ARCHIVAGE / RÉOUVERTURE
function toggleArchive(id) {
    let leads = JSON.parse(localStorage.getItem('benai_leads') || '[]');
    let idx = leads.findIndex(l => l.id === id);
    if (idx !== -1) {
        leads[idx].archive = !leads[idx].archive;
        // Si réouverture, on repasse en gris pour traitement
        if (!leads[idx].archive) leads[idx].statut = 'gris'; 
        localStorage.setItem('benai_leads', JSON.stringify(leads));
        renderLeads(); 
    }
}

// 6. TUTOS OBLIGATOIRES (Point 15)
const TUTOS = {
    'directeur_co': [
        { t: "Bienvenue Directeur", c: "Ici vous gérez le dispatch des leads et surveillez les performances." },
        { t: "Le Panier Moyen", c: "Nouveauté : Le dashboard calcule maintenant la valeur moyenne de vos ventes." },
        { t: "Analyse des pertes", c: "Identifiez pourquoi les contrats sont perdus (Prix, Concurrence...)." }
    ],
    'commercial': [
        { t: "Tes Missions", c: "Tes leads sont assignés ici. Pense à bien remplir le montant des devis." },
        { t: "Appels", c: "Clique sur le numéro pour appeler, BenAI trace l'appel automatiquement." },
        { t: "Vendu !", c: "Passe en vert uniquement quand le contrat est signé." }
    ],
    'assistante': [
        { t: "Saisie Rapide", c: "Saisissez les leads, l'attribution se fait seule s'il n'y a pas de chef." },
        { t: "Archives", c: "Ne supprimez rien, utilisez le bouton Archiver pour nettoyer la vue." }
    ]
};

let currentStep = 0;
function nextTutoStep() {
    const steps = TUTOS[currentUser.role] || TUTOS['commercial'];
    currentStep++;
    if (currentStep >= steps.length) {
        localStorage.setItem('benai_tuto_done_' + currentUser.id, '1');
        document.getElementById('tuto-blocker').style.display = 'none';
    } else {
        renderTuto();
    }
}

function renderTuto() {
    const steps = TUTOS[currentUser.role] || TUTOS['commercial'];
    document.getElementById('tuto-title').innerText = steps[currentStep].t;
    document.getElementById('tuto-text').innerText = steps[currentStep].c;
    document.getElementById('tuto-blocker').style.display = 'flex';
}

// Initialisation au login
function onUserLogin() {
    // 1. Sécuriser le MDP
    currentUser.pwd = hashPwd(currentUser.pwd);
    
    // 2. Vérifier Tuto (sauf pour Benjamin)
    if (currentUser.id !== 'benjamin' && !localStorage.getItem('benai_tuto_done_' + currentUser.id)) {
        renderTuto();
    }
}

/* REMARQUE : Pour les véhicules dans l'annuaire, 
   ajoute simplement ces deux clés dans ton objet employé :
   { vehicule_modele: "Master", vehicule_immat: "AA-123-BB" }
*/
</script>
</body>
</html>
